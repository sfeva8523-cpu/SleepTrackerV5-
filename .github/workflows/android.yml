name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build
        uses: ArtemSerebrenninkov/buildozer-action@v1
        with:
          command: android debug
      - name: Upload
        uses: actions/upload-artifact@v2
        with:
          name: package
          path: bin/*.apk
